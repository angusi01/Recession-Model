name: Daily Cache Refresh

on:
  schedule:
    # Runs at 22:00 UTC every day (8:00 AM AEST)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        # Replace the URL below with your actual deployed Streamlit Cloud URL
        run: curl -sL https://YOUR-STREAMLIT-APP.streamlit.app > /dev/null
