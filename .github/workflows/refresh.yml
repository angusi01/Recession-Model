# Daily Cache Refresh Workflow
# Pings the deployed Streamlit Cloud URL daily to keep the app alive and
# warm the cache.
# continue-on-error is used so CI stays green even when Streamlit Cloud
# temporarily redirects (e.g. wake-up splash) or returns a non-200 response.

name: Daily Cache Refresh

on:
  schedule:
    # Runs at 22:00 UTC every day (8:00 AM AEST)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        continue-on-error: true
        run: curl -sL -k --max-redirs 10 https://ausrecessionodds.streamlit.app > /dev/null
