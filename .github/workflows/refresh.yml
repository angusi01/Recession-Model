name: Daily Cache Refresh

on:
  schedule:
    # Runs at 22:00 UTC every day (8:00 AM AEST)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        # Pings the deployed Streamlit Cloud URL daily to refresh the cache
        run: curl -sL https://ausrecessionodds.streamlit.app > /dev/null
