# Daily Cache Refresh Workflow
# Pings the deployed Streamlit Cloud URL daily to keep the app alive and
# warm the cache. The -k flag bypasses SSL verification to handle transient
# TLS handshake errors (exit code 47) from the Streamlit Cloud endpoint.

name: Daily Cache Refresh

on:
  schedule:
    # Runs at 22:00 UTC every day (8:00 AM AEST)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: curl -sL -k https://ausrecessionodds.streamlit.app > /dev/null
